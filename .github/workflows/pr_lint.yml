# PR title linting.
#
# Enforces Conventional Commits format for pull request titles.
name: "PR Title Lint"

permissions:
  pull-requests: read

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  pin-github-actions:
    name: "validate action pins"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Require SHA-pinned GitHub Actions"
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(.github/workflows/*.yml .github/workflows/*.yaml)
          violations="$(
            perl -ne '
              if (/^\s*-?\s*uses:\s*([^#\s]+)/) {
                my $use = $1;
                next if $use =~ m{^\./|^docker://};
                if ($use !~ /@[0-9a-fA-F]{40}$/) {
                  print "$ARGV:$.: $use\n";
                }
              }
              close ARGV if eof;
            ' "${files[@]}"
          )"

          if [[ -n "$violations" ]]; then
            echo "::error::GitHub Actions must be pinned by commit SHA."
            echo "$violations"
            exit 1
          fi

  lint-pr-title:
    name: "validate format"
    runs-on: ubuntu-latest
    steps:
      - name: "Reject empty scope"
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ "$PR_TITLE" =~ ^[a-z]+\(\)[!]?: ]]; then
            echo "::error::PR title has empty scope parentheses: '$PR_TITLE'"
            echo "Either remove the parentheses or provide a scope (e.g., 'fix(core): ...')."
            exit 1
          fi

      - name: "Validate Conventional Commits format"
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            release
            hotfix
          scopes: |
            deepagents
            acp
            standard-tests
            providers
            daytona
            modal
            quickjs
            node-vfs
            deno
            evals
            examples
            docs
            internal
            infra
            deps
          requireScope: false
          disallowScopes: |
            release
            [A-Z]+
          ignoreLabels: |
            ignore-lint-pr-title
